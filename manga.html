    <style>

        body {
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            animation: gradientBG 15s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .quiz-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 30px;
            width: 500px;
            max-width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 2px rgba(233, 69, 96, 0.3);
            backdrop-filter: blur(10px);
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            color: #0f3460;
            margin-bottom: 20px;
            font-size: 32px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            background: linear-gradient(45deg, #0f3460, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 2px rgba(233, 69, 96, 0.5)); }
            50% { filter: drop-shadow(0 0 10px rgba(233, 69, 96, 0.8)); }
            100% { filter: drop-shadow(0 0 2px rgba(233, 69, 96, 0.5)); }
        }

        .score-display {
            background: linear-gradient(135deg, #0f3460, #1a4a7a);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: scorePulse 2s ease-in-out infinite;
        }

        @keyframes scorePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .score-display span {
            color: #e94560;
            font-size: 24px;
            margin-left: 5px;
        }

        #question-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 4px solid #0f3460;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        #question-image:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #question {
            color: #16213e;
            font-size: 22px;
            margin-bottom: 20px;
            min-height: 70px;
            font-weight: 600;
            padding: 10px;
            background: rgba(15, 52, 96, 0.1);
            border-radius: 15px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .timer-container {
            margin: 15px 0;
            text-align: center;
        }

        .timer-bar {
            width: 100%;
            height: 15px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b7c);
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px #e94560;
        }

        .timer-text {
            font-size: 18px;
            font-weight: bold;
            color: #0f3460;
            margin-top: 5px;
        }

        .timer-text.warning {
            color: #e94560;
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .answers button {
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #0f3460, #1a4a7a);
            color: white;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            animation: buttonPop 0.4s ease;
        }

        @keyframes buttonPop {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .answers button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .answers button:hover::before {
            width: 300px;
            height: 300px;
        }

        .answers button:hover:not(:disabled) {
            background: linear-gradient(135deg, #1a4a7a, #0f3460);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.4);
            border-color: #e94560;
        }

        .answers button.correct {
            background: linear-gradient(135deg, #2ecc71, #27ae60) !important;
            transform: scale(1.05);
            border-color: #fff;
            box-shadow: 0 0 25px #2ecc71;
            animation: correctPulse 0.5s ease;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1.05); }
        }

        .answers button.wrong {
            background: linear-gradient(135deg, #e74c3c, #c0392b) !important;
            transform: scale(0.95);
            border-color: #fff;
            box-shadow: 0 0 25px #e74c3c;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .answers button:disabled {
            opacity: 0.9;
            cursor: not-allowed;
        }

        .progress {
            color: #0f3460;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 600;
            padding: 10px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 10px;
            animation: progressGlow 2s ease-in-out infinite;
        }

        @keyframes progressGlow {
            0% { background: rgba(233, 69, 96, 0.1); }
            50% { background: rgba(233, 69, 96, 0.2); }
            100% { background: rgba(233, 69, 96, 0.1); }
        }

        #result {

            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }

            font-size: 32px;
            margin-bottom: 20px;

        #score {
            font-size: 28px;
            color: #e94560;
            font-weight: bold;

            100% { transform: scale(1); }

    for (let i = array.length - 1; i > 0; i--) {

        [array[i], array[j]] = [array[j], array[i]];
    }

}

let currentQuestionIndex = 0;
let scorePoints = 0;
const totalQuestions = questions.length;

const questionElement = document.getElementById("question");
const answersContainer = document.getElementById("answers");
const resultContainer = document.getElementById("result");
const scoreElement = document.getElementById("score");
const scorePointsElement = document.getElementById("score-points");
const victoryMessageElement = document.getElementById("victoryMessage");
const imageElement = document.getElementById("question-image");
const progressElement = document.getElementById("progress");
const timerProgress = document.getElementById("timer-progress");
const timerText = document.getElementById("timer-text");

function updateScoreDisplay() {
    scorePointsElement.textContent = scorePoints;
}

function startQuiz() {
    currentQuestionIndex = 0;
    scorePoints = 0;
    updateScoreDisplay();
    victoryMessageElement.classList.add("hidden");
    resultContainer.classList.add("hidden");
    document.getElementById("question-container").classList.remove("hidden");
    showQuestion();
}

function showQuestion() {
    resetState();
    
    if (currentQuestionIndex >= totalQuestions) {
        showResult();
        return;
    }

    const currentQuestion = questions[currentQuestionIndex];
    
    // Mise à jour du texte
    questionElement.textContent = currentQuestion.question;
    
    // Mise à jour de l'image
    if (currentQuestion.image) {
        imageElement.src = currentQuestion.image;
        imageElement.alt = "Image " + currentQuestion.question;
    }
    
    // Créer une copie des réponses et les mélanger
    const shuffledAnswers = shuffleArray([...currentQuestion.answers]);
    
    // Création des boutons de réponse avec les réponses mélangées
    shuffledAnswers.forEach(answer => {
        const button = document.createElement("button");
        button.textContent = answer.text;
        button.addEventListener("click", () => selectAnswer(answer, button));
        answersContainer.appendChild(button);
    });
    
    // Mise à jour de la progression
    updateProgress();
    
    // Démarrer le timer
    startTimer();
}

function startTimer() {
    timeLeft = 20;
    timerActive = true;
    timerProgress.style.width = '100%';
    timerText.textContent = '⏱️ 20 secondes';
    timerText.classList.remove('warning');
    
    if (timerInterval) {
        clearInterval(timerInterval);
    }
    
    timerInterval = setInterval(() => {
        if (!timerActive) return;
        
        timeLeft--;
        const percentage = (timeLeft / 20) * 100;
        timerProgress.style.width = percentage + '%';
        timerText.textContent = `⏱️ ${timeLeft} seconde${timeLeft > 1 ? 's' : ''}`;
        
        if (timeLeft <= 5) {
            timerText.classList.add('warning');
        }
        
        if (timeLeft <= 0) {
            // Temps écoulé
            clearInterval(timerInterval);
            timerActive = false;
            
            // Désactiver tous les boutons
            Array.from(answersContainer.children).forEach(btn => {
                btn.disabled = true;
            });
            
            // Montrer la bonne réponse
            Array.from(answersContainer.children).forEach(btn => {
                const answerObj = questions[currentQuestionIndex].answers.find(a => a.text === btn.textContent);
                if (answerObj && answerObj.correct) {
                    btn.classList.add("correct");
                }
            });
            
            // Passer à la question suivante après 2 secondes
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < totalQuestions) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 2000);
        }
    }, 1000);
}

function resetState() {
    answersContainer.innerHTML = "";
    if (timerInterval) {
        clearInterval(timerInterval);
    }
    timerActive = false;
}

function selectAnswer(answer, button) {
    if (!timerActive) return; // Empêcher de répondre si le timer est fini
    
    timerActive = false;
    clearInterval(timerInterval);
    
    // Désactiver tous les boutons
    Array.from(answersContainer.children).forEach(btn => {
        btn.disabled = true;
    });
    
    // Colorier les réponses et ajouter les points
    if (answer.correct) {
        button.classList.add("correct");
        scorePoints += POINTS_PAR_QUESTION;
        updateScoreDisplay();
    } else {
        button.classList.add("wrong");
        // Montrer la bonne réponse
        Array.from(answersContainer.children).forEach(btn => {
            const answerObj = questions[currentQuestionIndex].answers.find(a => a.text === btn.textContent);
            if (answerObj && answerObj.correct) {
                btn.classList.add("correct");
            }
        });
    }
    
    // Passer à la question suivante après 2 secondes
    setTimeout(() => {
        currentQuestionIndex++;
        if (currentQuestionIndex < totalQuestions) {
            showQuestion();
        } else {
            showResult();
        }
    }, 2000);
}

function showResult() {
    document.getElementById("question-container").classList.add("hidden");
    resultContainer.classList.remove("hidden");
    
    const percentage = Math.round((scorePoints / SCORE_MAX) * 100);
    scoreElement.innerHTML = `Score : ${scorePoints} / ${SCORE_MAX} points (${percentage}%)<br><br>`;
    
    // Vérifier si le score maximum est atteint
    if (scorePoints === SCORE_MAX) {
        victoryMessageElement.classList.remove("hidden");
    }
    
    // Message personnalisé selon le score
    let message = "";
    if (scorePoints === SCORE_MAX) message = "🏆 PARFAIT ! VOUS ÊTES UN LÉGENDE ! 🏆";
    else if (scorePoints >= 500) message = "🌟 Excellent niveau !";
    else if (scorePoints >= 400) message = "👍 Très bon score !";
    else if (scorePoints >= 300) message = "📚 Continuez vos lectures !";
    else message = "🎯 Encore un peu d'entraînement !";
    
    scoreElement.innerHTML += message;
}

function updateProgress() {
    progressElement.textContent = `Question ${currentQuestionIndex + 1} / ${totalQuestions}`;
}

function restartQuiz() {
    startQuiz();
}

// Démarrer le quiz
startQuiz();

// Lecture automatique de la musique au chargement de la page
window.addEventListener('load', function() {
    const bgMusic = document.getElementById('bgMusic');
    bgMusic.volume = 0.3; // Volume à 30%
    
    // Tentative de lecture automatique
    bgMusic.play().catch(function(error) {
        console.log("Lecture automatique bloquée par le navigateur");
        
        // Solution de secours : démarrer au premier clic n'importe où
        document.addEventListener('click', function playOnClick() {
            bgMusic.play();
            document.removeEventListener('click', playOnClick);
        }, { once: true });
    });
});
